name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  verify:
    name: lint, type-check, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: API tests
        run: pnpm --filter @petshop/api test -- --runInBand

      - name: Build
        run: pnpm build

      - name: Generated artifact audit
        run: pnpm audit:generated-artifacts

      - name: UTF-8 integrity check
        run: pnpm utf8:check
