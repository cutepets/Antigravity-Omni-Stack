# ═══════════════════════════════════════════════════════════════
# Nginx reverse proxy for app.petshophanoi.com
# ═══════════════════════════════════════════════════════════════
# Copy to: /etc/nginx/sites-available/app.petshophanoi.com.conf
# Symlink: ln -s /etc/nginx/sites-available/app.petshophanoi.com.conf /etc/nginx/sites-enabled/
# SSL:     certbot --nginx -d app.petshophanoi.com
# ═══════════════════════════════════════════════════════════════

# ── Rate Limiting ──────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=petshop_api:10m rate=30r/s;

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    server_name app.petshophanoi.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.petshophanoi.com;

    # SSL certs (managed by certbot — sẽ tự thêm sau khi chạy certbot)
    # ssl_certificate     /etc/letsencrypt/live/app.petshophanoi.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.petshophanoi.com/privkey.pem;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Client body size (uploads up to 50MB) ─────────────────
    client_max_body_size 50m;

    # ── API Backend (NestJS) ──────────────────────────────────
    location /api/ {
        limit_req zone=petshop_api burst=50 nodelay;

        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # ── Uploads (served by NestJS) ────────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache uploaded assets
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Socket.IO endpoint ────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Frontend (Next.js) — catch-all ────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR / dev websocket (production SSR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static assets caching ─────────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_cache_valid 200 365d;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
